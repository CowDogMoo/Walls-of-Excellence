---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-users-blueprint
  namespace: identity
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authentik-users-blueprint
    template:
      engineVersion: v2
      type: Opaque
      data:
        # Full user/group blueprint body lives in the AUTHENTIK_USERS_BLUEPRINT
        # field on the `authentik-secrets` 1Password item. Adding or removing a
        # user is purely a 1Password edit; usernames never appear in git. The
        # authentik chart mounts this Secret under /blueprints/mounted/
        # secret-authentik-users-blueprint/users.yaml via blueprints.secrets.
        users.yaml: "{{ .AUTHENTIK_USERS_BLUEPRINT }}"
  dataFrom:
    - extract:
        key: authentik-secrets
