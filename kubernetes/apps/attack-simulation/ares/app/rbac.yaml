---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ares-orchestrator
  namespace: attack-simulation
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ares-agent
  namespace: attack-simulation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ares-orchestrator
  namespace: attack-simulation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ares-orchestrator
  namespace: attack-simulation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ares-orchestrator
subjects:
  - kind: ServiceAccount
    name: ares-orchestrator
    namespace: attack-simulation
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ares-blue-orchestrator
  namespace: attack-simulation
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ares-blue-agent
  namespace: attack-simulation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ares-blue-orchestrator
  namespace: attack-simulation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ares-blue-orchestrator
  namespace: attack-simulation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ares-blue-orchestrator
subjects:
  - kind: ServiceAccount
    name: ares-blue-orchestrator
    namespace: attack-simulation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ares-blue-agent
  namespace: attack-simulation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ares-blue-agent
  namespace: attack-simulation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ares-blue-agent
subjects:
  - kind: ServiceAccount
    name: ares-blue-agent
    namespace: attack-simulation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ares-agent
  namespace: attack-simulation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ares-agent
  namespace: attack-simulation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ares-agent
subjects:
  - kind: ServiceAccount
    name: ares-agent
    namespace: attack-simulation
