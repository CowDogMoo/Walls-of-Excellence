---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: attack-simulation
data:
  nats.conf: |
    server_name: $POD_NAME
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222

    jetstream {
      store_dir: /data/jetstream
      max_memory_store: 512MB
      max_file_store: 8GB
    }

    # ares creates its own streams (ARES_TASKS, ARES_OPSTATE, etc.) via the
    # JetStream API on first connect, so no static stream config here.
