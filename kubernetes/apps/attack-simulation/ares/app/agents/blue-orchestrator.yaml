---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ares-blue-orchestrator
  namespace: attack-simulation
  labels:
    app.kubernetes.io/name: ares-blue-orchestrator
    app.kubernetes.io/part-of: attack-simulation
    ares.dreadnode.io/role: orchestrator
    ares.dreadnode.io/component: blue-team
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ares-blue-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ares-blue-orchestrator
        app.kubernetes.io/part-of: attack-simulation
        ares.dreadnode.io/role: orchestrator
        ares.dreadnode.io/component: blue-team
    spec:
      serviceAccountName: ares-blue-orchestrator
      imagePullSecrets:
        - name: ghcr-auth
      hostAliases:
        - ip: "10.1.10.10"
          hostnames:
            - "sevenkingdoms.local"
            - "kingslanding.sevenkingdoms.local"
            - "kingslanding"
        - ip: "10.1.10.11"
          hostnames:
            - "north.sevenkingdoms.local"
            - "winterfell.north.sevenkingdoms.local"
            - "winterfell"
        - ip: "10.1.10.12"
          hostnames:
            - "essos.local"
            - "meereen.essos.local"
            - "meereen"
        - ip: "10.1.10.22"
          hostnames:
            - "castelblack.north.sevenkingdoms.local"
            - "castelblack"
        - ip: "10.1.10.23"
          hostnames:
            - "braavos.essos.local"
            - "braavos"
      containers:
        - name: orchestrator
          image: ghcr.io/dreadnode/ares-blue-agent:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Ares blue orchestrator ready."
              sleep infinity
          env:
            - name: ARES_CONFIG
              value: "/etc/ares/ares.yaml"
            - name: ARES_EXECUTION_MODE
              value: "k8s"
            - name: ARES_TEAM
              value: "blue"
            - name: ARES_BLUE_ONLY
              value: "1"
            - name: ARES_BLUE_DISTRIBUTED_WORKERS
              value: "true"
            - name: INVESTIGATIONS_QUEUE
              value: "ares:blue:investigations"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis.attack-simulation.svc.cluster.local:6379"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ares-llm-secret
                  key: OPENAI_API_KEY
            - name: ARES_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ares-persistent-store-app
                  key: uri
            - name: ARES_DB_OFFLOAD_MODE
              value: "async"
            - name: ARES_DB_POOL_MAX_SIZE
              value: "10"
            - name: ARES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - configMapRef:
                name: ares-blue-agent-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/ares
            - name: workspace
              mountPath: /ares
      volumes:
        - name: config
          configMap:
            name: ares-config
        - name: workspace
          emptyDir: {}
