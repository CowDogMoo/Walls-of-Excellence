---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ares-blue-lateral-analyst
  namespace: attack-simulation
  labels:
    app.kubernetes.io/name: ares-blue-lateral-analyst
    app.kubernetes.io/part-of: attack-simulation
    ares.dreadnode.io/role: lateral-analyst
    ares.dreadnode.io/component: blue-team
spec:
  serviceName: ares-blue-lateral-analyst
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: ares-blue-lateral-analyst
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ares-blue-lateral-analyst
        app.kubernetes.io/part-of: attack-simulation
        ares.dreadnode.io/role: lateral-analyst
        ares.dreadnode.io/component: blue-team
    spec:
      serviceAccountName: ares-blue-agent
      imagePullSecrets:
        - name: ghcr-auth
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k8s7
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - macworker
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/part-of: attack-simulation
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: node.homelab/laptop
          operator: Equal
          value: "true"
          effect: NoSchedule
      hostAliases:
        - ip: "10.1.10.10"
          hostnames:
            - "sevenkingdoms.local"
            - "kingslanding.sevenkingdoms.local"
            - "kingslanding"
        - ip: "10.1.10.11"
          hostnames:
            - "north.sevenkingdoms.local"
            - "winterfell.north.sevenkingdoms.local"
            - "winterfell"
        - ip: "10.1.10.12"
          hostnames:
            - "essos.local"
            - "meereen.essos.local"
            - "meereen"
        - ip: "10.1.10.22"
          hostnames:
            - "castelblack.north.sevenkingdoms.local"
            - "castelblack"
        - ip: "10.1.10.23"
          hostnames:
            - "braavos.essos.local"
            - "braavos"
      containers:
        - name: agent
          image: ghcr.io/l50/ares-blue-lateral-analyst-agent:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                ares worker --redis-url "redis://:${REDIS_PASSWORD}@redis.attack-simulation.svc.cluster.local:6379"
                rc=$?
                echo "ares blue worker exited with status $rc; restarting in 5s" >&2
                sleep 5
              done
          stdin: true
          tty: true
          env:
            - name: ARES_WORKER_ROLE
              value: "lateral_analyst"
            - name: ARES_ROLE
              value: "lateral_analyst"
            - name: ARES_TEAM
              value: "blue"
            - name: ARES_BLUE_GLOBAL_POOL
              value: "true"
            - name: ARES_CONFIG
              value: "/etc/ares/ares.yaml"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ares-llm-secret
                  key: OPENAI_API_KEY
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ares-grafana-secret
                  key: GRAFANA_SERVICE_ACCOUNT_TOKEN
            - name: OTEL_SERVICE_NAME
              value: "ares-blue-lateral-analyst"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: ares-blue-agent-config
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/ares
            - name: workspace
              mountPath: /ares
          livenessProbe:
            exec:
              command:
                [
                  "/bin/sh",
                  "-c",
                  "grep -q 'ares worker' /proc/[0-9]*/cmdline 2>/dev/null",
                ]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                [
                  "/bin/sh",
                  "-c",
                  "grep -q 'ares worker' /proc/[0-9]*/cmdline 2>/dev/null",
                ]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: ares-config
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-client
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ares-blue-lateral-analyst
  namespace: attack-simulation
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: ares-blue-lateral-analyst
  ports:
    - name: http
      port: 80
      targetPort: 80
