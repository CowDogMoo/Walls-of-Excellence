---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ares-orchestrator
  namespace: attack-simulation
  labels:
    app.kubernetes.io/name: ares-orchestrator
    app.kubernetes.io/part-of: attack-simulation
    ares.dreadnode.io/component: red-team
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ares-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ares-orchestrator
        app.kubernetes.io/part-of: attack-simulation
        ares.dreadnode.io/component: red-team
    spec:
      serviceAccountName: ares-orchestrator
      imagePullSecrets:
        - name: ghcr-auth
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k8s7
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/part-of: attack-simulation
                topologyKey: kubernetes.io/hostname
      hostAliases:
        - ip: "10.1.10.10"
          hostnames:
            - "sevenkingdoms.local"
            - "kingslanding.sevenkingdoms.local"
            - "kingslanding"
        - ip: "10.1.10.11"
          hostnames:
            - "north.sevenkingdoms.local"
            - "winterfell.north.sevenkingdoms.local"
            - "winterfell"
        - ip: "10.1.10.12"
          hostnames:
            - "essos.local"
            - "meereen.essos.local"
            - "meereen"
        - ip: "10.1.10.22"
          hostnames:
            - "castelblack.north.sevenkingdoms.local"
            - "castelblack"
        - ip: "10.1.10.23"
          hostnames:
            - "braavos.essos.local"
            - "braavos"
      containers:
        - name: orchestrator
          image: ghcr.io/l50/ares-orchestrator:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "ares orchestrator queue dispatcher starting" >&2
              while true; do
                OP_REQUEST=$(RUST_LOG=error ares ops claim-next --timeout 30 2>/dev/null | tail -n 1 || true)
                if [ -n "$OP_REQUEST" ]; then
                  OP_ID=$(printf '%s\n' "$OP_REQUEST" | sed -n 's/.*"operation_id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
                  echo "Starting operation: ${OP_ID:-unknown}" >&2
                  export ARES_OPERATION_ID="$OP_REQUEST"
                  ares orchestrator
                  status=$?
                  echo "Operation ${OP_ID:-unknown} exited with status $status" >&2
                fi
              done
          env:
            - name: ARES_CONFIG
              value: "/etc/ares/ares.yaml"
            - name: ARES_EXECUTION_MODE
              value: "k8s"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis.attack-simulation.svc.cluster.local:6379"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ares-llm-secret
                  key: OPENAI_API_KEY
            - name: ARES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              value: "INFO"
            - name: OTEL_SERVICE_NAME
              value: "ares-orchestrator"
          envFrom:
            - configMapRef:
                name: ares-agent-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/ares
            - name: workspace
              mountPath: /ares
      volumes:
        - name: config
          configMap:
            name: ares-config
        - name: workspace
          emptyDir: {}
