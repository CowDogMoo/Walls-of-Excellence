---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ares-agent-config
  namespace: attack-simulation
data:
  ARES_EXECUTION_MODE: "k8s"
  ARES_WORKER_MODE: "tool_exec"
  REDIS_HOST: "redis.attack-simulation.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  NATS_URL: "nats://nats.attack-simulation.svc.cluster.local:4222"
  ARES_NATS_URL: "nats://nats.attack-simulation.svc.cluster.local:4222"
  CHECKPOINT_INTERVAL: "60"
  MAX_RETRIES: "3"
  RETRY_DELAY: "5"
  K8S_NAMESPACE: "attack-simulation"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  COORDINATION_MODE: "distributed"
  STATE_TTL_HOURS: "24"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.observability.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_SERVICE_NAMESPACE: "ares"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_RESOURCE_ATTRIBUTES: >-
    service.namespace=attack-simulation,
    deployment.environment=woe,
    attack.team=red,
    attack.framework=mitre-attack,
    attack.platform=windows,
    attack.domain=enterprise
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ares-blue-agent-config
  namespace: attack-simulation
  labels:
    app.kubernetes.io/part-of: attack-simulation
    ares.local/component: blue-team
data:
  ARES_EXECUTION_MODE: "k8s"
  ARES_WORKER_MODE: "blue_task"
  ARES_TEAM: "blue"
  ARES_BLUE_ENABLED: "1"
  ARES_LLM_MODEL: "gpt-5.2"
  ARES_BLUE_LLM_MODEL: "gpt-5.2"
  K8S_LABEL_SELECTOR: "ares.local/component=blue-team"
  INVESTIGATION_TIMEOUT: "3600"
  REDIS_HOST: "redis.attack-simulation.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  NATS_URL: "nats://nats.attack-simulation.svc.cluster.local:4222"
  ARES_NATS_URL: "nats://nats.attack-simulation.svc.cluster.local:4222"
  CHECKPOINT_INTERVAL: "60"
  MAX_RETRIES: "3"
  RETRY_DELAY: "5"
  K8S_NAMESPACE: "attack-simulation"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  COORDINATION_MODE: "distributed"
  STATE_TTL_HOURS: "24"
  GRAFANA_URL: "http://grafana.observability.svc.cluster.local"
  LOKI_URL: "http://loki.observability.svc.cluster.local:3100"
  PROMETHEUS_URL: "http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.observability.svc.cluster.local:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_SERVICE_NAMESPACE: "ares-blue"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
  TEMPO_URL: "http://tempo.observability.svc.cluster.local:3200"
  OTEL_RESOURCE_ATTRIBUTES: >-
    service.namespace=attack-simulation,
    deployment.environment=woe,
    attack.team=blue,
    attack.role=defender,
    investigation.framework=mitre-defend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ares-config
  namespace: attack-simulation
data:
  ares.yaml: |
    operation:
      name: "ares-multi-agent"
      namespace: "attack-simulation"
      checkpoint_interval: 60
      max_concurrent_tasks: 8
      task_dispatch_delay: 1.0
      rate_limit_backoff: 15.0
      rate_limit_threshold: 2
      stop_on_golden_ticket: false
      strategy: comprehensive
      continue_after_da: true

    agents:
      orchestrator:
        model: "gpt-5.2"
        max_steps: 200
        pod_selector: "app.kubernetes.io/name=ares-orchestrator"

      recon:
        model: "gpt-5.2"
        max_steps: 100
        pod_selector: "ares.local/role=recon"

      credential_access:
        model: "gpt-5.2"
        max_steps: 100
        pod_selector: "ares.local/role=credential_access"

      acl:
        model: "gpt-5.2"
        max_steps: 150
        pod_selector: "ares.local/role=acl"

      privesc:
        model: "gpt-5.2"
        max_steps: 100
        pod_selector: "ares.local/role=privesc"

      lateral:
        model: "gpt-5.2"
        max_steps: 300
        pod_selector: "ares.local/role=lateral"

      coercion:
        model: "gpt-5.2"
        max_steps: 30
        pod_selector: "ares.local/role=coercion"

      blue_orchestrator:
        model: "gpt-5.2"
        max_steps: 200
        pod_selector: "app.kubernetes.io/name=ares-blue-orchestrator"

      blue_triage:
        model: "gpt-5.2"
        max_steps: 100
        pod_selector: "ares.local/role=triage,ares.local/component=blue-team"

      blue_threat_hunter:
        model: "gpt-5.2"
        max_steps: 150
        pod_selector: "ares.local/role=threat-hunter,ares.local/component=blue-team"

      blue_lateral_analyst:
        model: "gpt-5.2"
        max_steps: 200
        pod_selector: "ares.local/role=lateral-analyst,ares.local/component=blue-team"

    timeouts:
      agent_heartbeat: 180
      task_timeout: 300
      operation_timeout: 7200
      lateral_movement: 180
      hash_cracking: 600
      exploitation: 900

    recovery:
      enabled: true
      max_retries: 3
      retry_delay: 10
      checkpoint_on_credential: true
      checkpoint_on_vulnerability: true
