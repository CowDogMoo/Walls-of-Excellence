            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 1
          }
        },
        {
          "id": 7,
          "title": "Task Executions (5m)",
          "type": "stat",
          "datasource": {
