            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 6
          }
        },
        {
          "id": 85,
          "title": "Domain Admin",
          "type": "stat",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "Domain Admin achieved events",
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"attack-simulation\", job=~\"$agent\"} |~ \"DOMAIN ADMIN|has_domain_admin|domain.*admin.*achieved\"[24h])) or vector(0)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
