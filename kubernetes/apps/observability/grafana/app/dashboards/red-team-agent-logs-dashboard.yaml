          "type": "stat",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "Operations completed successfully (with duration)",
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"attack-simulation\", job=~\"$agent\"} |~ \"completed successfully.*duration\"[24h])) or vector(0)",
