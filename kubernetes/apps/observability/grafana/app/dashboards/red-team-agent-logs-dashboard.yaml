                  {
                    "color": "green",
                    "value": 5
                  }
                ]
              },
              "unit": "short",
              "displayName": "Active Agents"
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 1
          }
        },
        {
          "id": 6,
          "title": "Operations Detected (5m)",
          "type": "stat",
          "datasource": {
            "type": "loki",
            "uid": "loki"
