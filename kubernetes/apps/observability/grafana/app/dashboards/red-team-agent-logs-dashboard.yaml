                  },
                  {
                    "color": "yellow",
                    "value": 10
                  }
                ]
              },
              "unit": "short",
              "displayName": "Credentials"
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 6
