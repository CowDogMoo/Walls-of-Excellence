            "uid": "loki"
          },
          "targets": [
            {
              "expr": "sum(count_over_time({namespace=\"attack-simulation\", job=~\"$agent\"} |~ \"(?i)(executing|completed|task|dispatch)\"[5m])) or vector(0)",
