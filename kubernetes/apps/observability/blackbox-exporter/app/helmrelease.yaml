---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-blackbox-exporter
  namespace: observability
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: prometheus-blackbox-exporter
    namespace: observability
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false

  values:
    fullnameOverride: blackbox-exporter

    config:
      modules:
        tcp_connect:
          prober: tcp
          timeout: 5s
        http_2xx:
          prober: http
          timeout: 5s
          http:
            preferred_ip_protocol: ip4
            valid_status_codes: []
        icmp:
          prober: icmp
          timeout: 5s
          icmp:
            preferred_ip_protocol: ip4

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 96Mi

    serviceMonitor:
      enabled: false

    pspEnabled: false

    allowIcmp: true
